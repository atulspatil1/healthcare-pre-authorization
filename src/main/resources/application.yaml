spring:
  application:
    name: healthcare-pre-authorization
  datasource:
    url: jdbc:mysql://localhost:3306/healthcare_preauth?useSSL=false&serverTimezone=UTC
    username: dbuser
    password: dbpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
